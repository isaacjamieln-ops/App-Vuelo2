<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirect</title>
    <script>
      var path = window.location.pathname;
      var repo = "/App-Vuelo";

      sessionStorage.redirect = path.replace(repo, "");
      window.location.replace(repo + "/");
    </script>
  </head>
  <body></body>
</html>
